<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Austin Soundboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 2rem;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 0%, #888 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 1rem;
      width: 100%;
      max-width: 720px;
    }

    .btn {
      position: relative;
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 1.5rem 1rem;
      color: #e0e0e0;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      text-align: center;
      letter-spacing: -0.01em;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:hover {
      background: #1e1e1e;
      border-color: #444;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
    }

    .btn:active {
      transform: translateY(0);
      background: #252525;
    }

    .btn.playing {
      border-color: #6366f1;
      box-shadow: 0 0 20px rgba(99, 102, 241, 0.25);
    }

    .btn .emoji {
      display: block;
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }

    .hotkey {
      display: block;
      margin-top: 0.5rem;
      font-size: 0.65rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .stop-all {
      margin-top: 2rem;
      background: transparent;
      border: 1px solid #333;
      border-radius: 8px;
      color: #666;
      padding: 0.6rem 1.5rem;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stop-all:hover {
      color: #ef4444;
      border-color: #ef4444;
    }
  </style>
</head>
<body>
  <h1>🎛️ Austin Soundboard</h1>
  <div class="board" id="board"></div>
  <button class="stop-all" id="stopAll">■ Stop All</button>

  <script>
    const sounds = [
      { file: 'audio/fahh.mp3',           label: 'Fahh',            emoji: '😩', key: '1' },
      { file: 'audio/liberal.mp3',         label: 'Liberal!',        emoji: '📢', key: '2' },
      { file: 'audio/arms-of-angel.mp3',   label: 'Arms of Angel',  emoji: '😢', key: '3' },
      { file: 'audio/vine-boom.mp3',       label: 'Vine Boom',      emoji: '💥', key: '4' },
    ];

    const board = document.getElementById('board');
    const audioMap = new Map();

    sounds.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'btn';
      btn.innerHTML = `<span class="emoji">${s.emoji}</span>${s.label}<span class="hotkey">${s.key}</span>`;

      const audio = new Audio(s.file);
      audio.preload = 'auto';
      audioMap.set(btn, audio);

      audio.addEventListener('ended', () => btn.classList.remove('playing'));

      btn.addEventListener('click', () => {
        // If already playing, restart it
        audio.currentTime = 0;
        audio.play();
        btn.classList.add('playing');
      });

      board.appendChild(btn);
    });

    // Keyboard shortcuts
    const keyMap = new Map();
    audioMap.forEach((audio, btn) => {
      const s = sounds.find(s => s.label === btn.textContent.replace(/[^\w\s!]/g, '').trim().split('\n')[0]);
    });
    const btnList = [...board.children];
    document.addEventListener('keydown', (e) => {
      const idx = parseInt(e.key) - 1;
      if (idx >= 0 && idx < btnList.length) {
        btnList[idx].click();
      }
      if (e.key === 'Escape') {
        document.getElementById('stopAll').click();
      }
    });

    document.getElementById('stopAll').addEventListener('click', () => {
      audioMap.forEach((audio, btn) => {
        audio.pause();
        audio.currentTime = 0;
        btn.classList.remove('playing');
      });
    });
  </script>
</body>
</html>
